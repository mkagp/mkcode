name: MK Code CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mkcode-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate supported baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: "true"
      T3CODE_TELEMETRY_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0

      - name: Enable repository pnpm version
        run: |
          corepack enable
          corepack install
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint
        run: pnpm exec vp check

      - name: Typecheck
        run: pnpm exec vp run typecheck

      - name: Ensure Electron runtime is installed
        run: pnpm exec vp run --filter @t3tools/desktop ensure:electron

      - name: Test
        run: pnpm exec vp run test

      - name: Build
        run: pnpm run build

      - name: Exercise release mechanics without publishing
        run: pnpm exec node scripts/release-smoke.ts
